<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Paneli</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #333; }
    
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; }
    .header .logout { background: rgba(255,255,255,0.15); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .header .logout:hover { background: rgba(255,255,255,0.25); }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    /* Login */
    .login-box { max-width: 360px; margin: 80px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .login-box h2 { margin-bottom: 20px; text-align: center; color: #1a1a2e; }
    .login-box input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; margin-bottom: 12px; }
    .login-box input:focus { outline: none; border-color: #1a1a2e; }
    .login-box .btn { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .login-box .btn:hover { background: #16213e; }
    #loginError { color: #dc3545; font-size: 13px; margin-top: 8px; text-align: center; display: none; }

    /* Admin content */
    .admin-content { display: none; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 20px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; color: #888; transition: all 0.2s; border-bottom: 3px solid transparent; }
    .tab:hover { color: #333; }
    .tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; background: #f8f9ff; }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-card .num { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }

    /* Filters */
    .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filters select, .filters input { padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; }
    .filters select:focus, .filters input:focus { outline: none; border-color: #1a1a2e; }

    /* Tables */
    .table-wrap { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f9fa; padding: 12px 14px; text-align: left; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 12px 14px; border-top: 1px solid #f0f0f0; font-size: 14px; }
    tr:hover { background: #fafafa; }

    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #d4edda; color: #155724; }
    .status-completed { background: #cce5ff; color: #004085; }
    .status-canceled { background: #f8d7da; color: #721c24; }

    .action-btn { display: inline-block; padding: 4px 10px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 1px; background: #fff; }
    .action-btn:hover { background: #f0f0f0; }
    .action-btn.danger { color: #dc3545; border-color: #dc3545; }
    .action-btn.danger:hover { background: #dc3545; color: #fff; }
    .action-btn.success { color: #28a745; border-color: #28a745; }
    .action-btn.success:hover { background: #28a745; color: #fff; }
    .action-btn.primary { color: #007bff; border-color: #007bff; }
    .action-btn.primary:hover { background: #007bff; color: #fff; }
    .action-btn.warning { color: #ffc107; border-color: #ffc107; }
    .action-btn.warning:hover { background: #ffc107; color: #fff; }

    /* Settings form */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .settings-grid label { display: block; font-size: 12px; font-weight: 600; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .settings-grid input, .settings-grid select { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
    .settings-grid input:focus, .settings-grid select:focus { outline: none; border-color: #1a1a2e; }

    .add-form { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .add-form input, .add-form select { padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; flex: 1; min-width: 120px; }
    .add-form button { padding: 10px 20px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
    .add-form button:hover { background: #16213e; }

    .section-title { font-size: 16px; margin-bottom: 12px; color: #333; font-weight: 600; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; display: none; animation: fadeIn 0.3s; }

    /* Barber appointments modal */
    .barber-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .barber-modal.open { display: flex; }
    .barber-modal .modal-content { background: #fff; border-radius: 12px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .barber-modal .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .barber-modal .modal-header h3 { font-size: 18px; }
    .barber-modal .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; }
    .barber-modal .modal-close:hover { color: #333; }
    .barber-modal .appt-item { padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; }
    .barber-modal .appt-item .top { display: flex; justify-content: space-between; align-items: start; }
    .barber-modal .appt-item .detail { font-size: 13px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔧 Admin Paneli</h1>
    <button class="logout" id="logoutBtn" style="display:none;" onclick="logout()">Çıkış</button>
  </div>

  <!-- Login -->
  <div class="login-box" id="loginBox">
    <h2>Admin Girişi</h2>
    <input type="password" id="passwordInput" placeholder="Şifre" onkeydown="if(event.key==='Enter') login()">
    <button class="btn" onclick="login()">Giriş</button>
    <div id="loginError"></div>
  </div>

  <!-- Admin Content -->
  <div class="container admin-content" id="adminContent">
    <!-- Stats -->
    <div class="stats" id="statsContainer"></div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('appointments')">Randevular</div>
      <div class="tab" onclick="switchTab('barbers')">Ustalar</div>
      <div class="tab" onclick="switchTab('services')">Hizmetler</div>
      <div class="tab" onclick="switchTab('settings')">Ayarlar</div>
    </div>

    <!-- Tab: Appointments -->
    <div class="tab-content active" id="tabAppointments">
      <div class="filters">
        <input type="date" id="filterDate" onchange="loadAppointments()">
        <select id="filterStatus" onchange="loadAppointments()">
          <option value="">Tüm Durumlar</option>
          <option value="pending">Onay Bekliyor</option>
          <option value="confirmed">Onaylandı</option>
          <option value="completed">Tamamlandı</option>
          <option value="canceled">İptal Edildi</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Müşteri</th><th>Telefon</th><th>Usta</th><th>Hizmet</th><th>Tarih</th><th>Saat</th><th>Durum</th><th>İşlem</th></tr></thead>
          <tbody id="appointmentTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Tab: Barbers -->
    <div class="tab-content" id="tabBarbers">
      <div class="add-form">
        <input type="text" id="barberNameInput" placeholder="Usta adı">
        <input type="text" id="barberDescInput" placeholder="Açıklama">
        <button onclick="addBarber()">Ekle</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>İsim</th><th>Açıklama</th><th>Durum</th><th>İşlem</th></tr></thead>
          <tbody id="barberTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Tab: Services -->
    <div class="tab-content" id="tabServices">
      <div class="add-form">
        <input type="text" id="serviceNameInput" placeholder="Hizmet adı">
        <input type="number" id="serviceDurationInput" placeholder="Süre (dk)" value="30" style="max-width:100px;">
        <input type="number" id="servicePriceInput" placeholder="Ücret (TL)" value="0" style="max-width:100px;">
        <button onclick="addService()">Ekle</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Hizmet</th><th>Süre</th><th>Ücret</th><th>Durum</th><th>İşlem</th></tr></thead>
          <tbody id="serviceTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Tab: Settings -->
    <div class="tab-content" id="tabSettings">
      <div class="settings-grid">
        <div>
          <label>İşletme Adı</label>
          <input type="text" id="s_business_name">
        </div>
        <div>
          <label>Başlık</label>
          <input type="text" id="s_business_title">
        </div>
        <div>
          <label>Açıklama</label>
          <input type="text" id="s_business_description">
        </div>
        <div>
          <label>Çalışma Başlangıç</label>
          <input type="time" id="s_work_start">
        </div>
        <div>
          <label>Çalışma Bitiş</label>
          <input type="time" id="s_work_end">
        </div>
        <div>
          <label>Mola Başlangıç</label>
          <input type="time" id="s_break_start">
        </div>
        <div>
          <label>Mola Bitiş</label>
          <input type="time" id="s_break_end">
        </div>
        <div>
          <label>Aralık (dk)</label>
          <input type="number" id="s_slot_interval" value="30">
        </div>
        <div>
          <label>Çalışma Günleri</label>
          <input type="text" id="s_work_days" placeholder="1,2,3,4,5,6">
        </div>
        <div style="display: flex; align-items: end;">
          <button class="action-btn primary" onclick="saveSettings()" style="padding: 10px 24px; font-size: 14px;">Kaydet</button>
        </div>
      </div>
      <div style="margin-top: 20px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
        <label style="font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px;">Şifre Değiştir</label>
        <div style="display: flex; gap: 8px; margin-top: 8px;">
          <input type="password" id="currentPassword" placeholder="Mevcut şifre">
          <input type="password" id="newPassword" placeholder="Yeni şifre">
          <button class="action-btn primary" onclick="changePassword()">Değiştir</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TOKEN_KEY = 'admin_token';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function login() {
      const pw = document.getElementById('passwordInput').value;
      document.getElementById('loginError').style.display = 'none';
      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      }).then(r => {
        if (!r.ok) { document.getElementById('loginError').textContent = 'Hatalı şifre!'; document.getElementById('loginError').style.display = 'block'; return null; }
        return r.json();
      }).then(data => {
        if (data && data.token) {
          localStorage.setItem(TOKEN_KEY, data.token);
          showAdmin();
        }
      });
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      document.getElementById('adminContent').style.display = 'none';
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('passwordInput').value = '';
    }

    function showAdmin() {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'block';
      loadStats();
      loadAppointments();
      loadBarbers();
      loadServices();
      loadSettings();
    }

    // Check stored token
    if (localStorage.getItem(TOKEN_KEY)) showAdmin();

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
      document.getElementById(`tab${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add('active');
    }

    // === Stats ===
    function loadStats() {
      fetch('/api/stats').then(r => r.json()).then(d => {
        document.getElementById('statsContainer').innerHTML = `
          <div class="stat-card"><div class="num">${d.totalAppointments}</div><div class="label">Toplam Randevu</div></div>
          <div class="stat-card"><div class="num">${d.todayAppointments}</div><div class="label">Bugün</div></div>
          <div class="stat-card"><div class="num">${d.pendingCount}</div><div class="label">Bekleyen</div></div>
          <div class="stat-card"><div class="num">${d.activeBarbers}</div><div class="label">Usta</div></div>
          <div class="stat-card"><div class="num">${d.activeServices}</div><div class="label">Hizmet</div></div>
        `;
      });
    }

    // === Appointments ===
    function loadAppointments() {
      const date = document.getElementById('filterDate').value;
      const status = document.getElementById('filterStatus').value;
      let url = '/api/appointments/admin';
      const params = [];
      if (date) { params.push(`date=${date}`); }
      if (status) { params.push(`status=${status}`); }
      if (params.length) url += '?' + params.join('&');
      
      fetch(url).then(r => r.json()).then(rows => {
        const tbody = document.getElementById('appointmentTable');
        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#888;padding:30px;">Randevu bulunamadı</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(a => {
          const statusMap = { pending: 'Onay Bekliyor', confirmed: 'Onaylandı', completed: 'Tamamlandı', canceled: 'İptal Edildi' };
          return `<tr>
            <td style="cursor:pointer;color:#1a1a2e;" onclick="showCustomerAppointments('${a.customer_phone.replace(/'/g, "\\'")}', '${a.customer_name.replace(/'/g, "\\'")}')">${a.customer_name}</td>
            <td>${a.customer_phone}</td>
            <td>${a.barber_name}</td>
            <td>${a.service_name}</td>
            <td>${a.date}</td>
            <td>${a.time}</td>
            <td><span class="status-badge status-${a.status}">${statusMap[a.status] || a.status}</span></td>
            <td>
              ${a.status === 'pending' ? `<button class="action-btn success" onclick="updateStatus(${a.id},'confirmed')">Onayla</button>` : ''}
              ${a.status === 'confirmed' ? `<button class="action-btn primary" onclick="updateStatus(${a.id},'completed')">Tamamla</button>` : ''}
              ${a.status !== 'canceled' ? `<button class="action-btn warning" onclick="updateStatus(${a.id},'canceled')">İptal</button>` : ''}
              <button class="action-btn danger" onclick="deleteAppointment(${a.id})">Sil</button>
            </td>
          </tr>`;
        }).join('');
      });
    }

    function updateStatus(id, status) {
      fetch(`/api/appointments/${id}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      }).then(r => r.json()).then(() => { loadAppointments(); loadStats(); showToast('✅ Durum güncellendi'); });
    }

    function deleteAppointment(id) {
      if (!confirm('Bu randevuyu silmek istediğinize emin misiniz?')) return;
      fetch(`/api/appointments/${id}`, { method: 'DELETE' })
        .then(r => r.json()).then(() => { loadAppointments(); loadStats(); showToast('🗑️ Silindi'); });
    }

    // === Barbers ===
    function loadBarbers() {
      fetch('/api/barbers/all').then(r => r.json()).then(rows => {
        const tbody = document.getElementById('barberTable');
        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888;padding:30px;">Usta bulunamadı</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(b => `<tr>
          <td style="cursor:pointer;color:#1a1a2e;" onclick="showBarberAppointments(${b.id}, '${b.name.replace(/'/g, "\\'")}')">${b.name}</td>
          <td>${b.description || ''}</td>
          <td>${b.is_active ? '✅ Aktif' : '❌ Pasif'}</td>
          <td>
            <button class="action-btn primary" onclick="showOffDays(${b.id}, '${b.name.replace(/'/g, "\\'")}')">📅 İzinler</button>
            <button class="action-btn ${b.is_active ? 'warning' : 'success'}" onclick="toggleBarber(${b.id}, ${b.is_active})">${b.is_active ? 'Pasifleştir' : 'Aktifleştir'}</button>
            <button class="action-btn danger" onclick="deleteBarber(${b.id})">Sil</button>
          </td>
        </tr>`).join('');
      });
    }

    function addBarber() {
      const name = document.getElementById('barberNameInput').value.trim();
      const desc = document.getElementById('barberDescInput').value.trim();
      if (!name) { showToast('❌ İsim gerekli'); return; }
      fetch('/api/barbers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, description: desc }) })
        .then(r => r.json()).then(() => {
          document.getElementById('barberNameInput').value = '';
          document.getElementById('barberDescInput').value = '';
          loadBarbers(); loadStats();
          showToast('✅ Usta eklendi');
        });
    }

    function toggleBarber(id, current) {
      fetch(`/api/barbers/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ is_active: current ? 0 : 1 }) })
        .then(r => r.json()).then(() => { loadBarbers(); loadStats(); });
    }

    function deleteBarber(id) {
      if (!confirm('Bu ustayı silmek istediğinize emin misiniz?')) return;
      fetch(`/api/barbers/${id}`, { method: 'DELETE' })
        .then(r => r.json()).then(() => { loadBarbers(); loadStats(); showToast('🗑️ Silindi'); });
    }

    // === Off Days ===
    let currentOffDayBarberId = null;
    let currentOffDayBarberName = '';

    function showOffDays(barberId, barberName) {
      currentOffDayBarberId = barberId;
      currentOffDayBarberName = barberName;
      const modal = document.getElementById('offDaysModal');
      const title = document.getElementById('offDaysModalTitle');
      const body = document.getElementById('offDaysModalBody');
      title.textContent = '📅 ' + barberName + ' - İzin Günleri';
      body.innerHTML = '<div class="loading">Yükleniyor</div>';
      modal.classList.add('open');

      // Reset form
      document.getElementById('offDateInput').value = '';
      document.getElementById('offStartInput').value = '';
      document.getElementById('offEndInput').value = '';
      document.getElementById('offReasonInput').value = '';

      loadOffDays();
    }

    function loadOffDays() {
      const body = document.getElementById('offDaysModalBody');
      body.innerHTML = '<div class="loading">Yükleniyor</div>';
      fetch('/api/barbers/' + currentOffDayBarberId + '/off-days')
        .then(r => r.json())
        .then(rows => {
          body.innerHTML = '';
          if (rows.length === 0) {
            body.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">Henüz izin günü yok</p>';
            return;
          }
          const today = new Date().toISOString().split('T')[0];
          rows.forEach(r => {
            const isPast = r.date < today;
            const item = document.createElement('div');
            item.className = 'appt-item';
            let detail = '📅 ' + r.date;
            if (r.start_time && r.end_time) {
              detail += ' ⏰ ' + r.start_time + ' - ' + r.end_time;
            } else {
              detail += ' 🚫 Tüm gün';
            }
            if (r.reason) detail += ' | ' + r.reason;
            if (isPast) item.style.opacity = '0.6';
            item.innerHTML = '<div class="top"><div>' + detail + '</div><div><button class="action-btn danger" style="font-size:12px;padding:4px 8px;" onclick="deleteOffDay(' + r.id + ')">Sil</button></div></div>';
            body.appendChild(item);
          });
        })
        .catch(() => {
          body.innerHTML = '<p style="color: #dc3545; text-align: center;">Yüklenirken hata oluştu</p>';
        });
    }

    function addOffDay() {
      const date = document.getElementById('offDateInput').value;
      const startTime = document.getElementById('offStartInput').value;
      const endTime = document.getElementById('offEndInput').value;
      const reason = document.getElementById('offReasonInput').value.trim();
      if (!date) { showToast('❌ Tarih gerekli'); return; }

      fetch('/api/barbers/' + currentOffDayBarberId + '/off-days', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, start_time: startTime, end_time: endTime, reason })
      }).then(r => r.json()).then(() => {
        showToast('✅ İzin eklendi');
        loadOffDays();
      });
    }

    function deleteOffDay(id) {
      if (!confirm('Bu izni silmek istediğinize emin misiniz?')) return;
      fetch('/api/off-days/' + id, { method: 'DELETE' })
        .then(r => r.json()).then(() => { loadOffDays(); showToast('🗑️ İzin silindi'); });
    }

    function closeOffDaysModal() {
      document.getElementById('offDaysModal').classList.remove('open');
    }

    // Click outside to close
    document.getElementById('offDaysModal').addEventListener('click', function(e) {
      if (e.target === e.currentTarget) closeOffDaysModal();
    });

    // === Services ===
    function loadServices() {
      fetch('/api/services/all').then(r => r.json()).then(rows => {
        const tbody = document.getElementById('serviceTable');
        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:30px;">Hizmet bulunamadı</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(s => `<tr>
          <td>${s.name}</td>
          <td>${s.duration} dk</td>
          <td>${s.price} TL</td>
          <td>${s.is_active ? '✅ Aktif' : '❌ Pasif'}</td>
          <td>
            <button class="action-btn ${s.is_active ? 'warning' : 'success'}" onclick="toggleService(${s.id}, ${s.is_active})">${s.is_active ? 'Pasifleştir' : 'Aktifleştir'}</button>
            <button class="action-btn danger" onclick="deleteService(${s.id})">Sil</button>
          </td>
        </tr>`).join('');
      });
    }

    function addService() {
      const name = document.getElementById('serviceNameInput').value.trim();
      const duration = parseInt(document.getElementById('serviceDurationInput').value) || 30;
      const price = parseInt(document.getElementById('servicePriceInput').value) || 0;
      if (!name) { showToast('❌ İsim gerekli'); return; }
      fetch('/api/services', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, duration, price }) })
        .then(r => r.json()).then(() => {
          document.getElementById('serviceNameInput').value = '';
          document.getElementById('serviceDurationInput').value = '30';
          document.getElementById('servicePriceInput').value = '0';
          loadServices(); loadStats();
          showToast('✅ Hizmet eklendi');
        });
    }

    function toggleService(id, current) {
      fetch(`/api/services/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ is_active: current ? 0 : 1 }) })
        .then(r => r.json()).then(() => { loadServices(); loadStats(); });
    }

    function deleteService(id) {
      if (!confirm('Bu hizmeti silmek istediğinize emin misiniz?')) return;
      fetch(`/api/services/${id}`, { method: 'DELETE' })
        .then(r => r.json()).then(() => { loadServices(); loadStats(); showToast('🗑️ Silindi'); });
    }

    // === Settings ===
    function loadSettings() {
      fetch('/api/settings').then(r => r.json()).then(s => {
        document.getElementById('s_business_name').value = s.business_name || '';
        document.getElementById('s_business_title').value = s.business_title || '';
        document.getElementById('s_business_description').value = s.business_description || '';
        document.getElementById('s_work_start').value = s.work_start || '09:00';
        document.getElementById('s_work_end').value = s.work_end || '19:00';
        document.getElementById('s_break_start').value = s.break_start || '';
        document.getElementById('s_break_end').value = s.break_end || '';
        document.getElementById('s_slot_interval').value = s.slot_interval || '30';
        document.getElementById('s_work_days').value = s.work_days || '1,2,3,4,5,6';
      });
    }

    function saveSettings() {
      const body = {
        business_name: document.getElementById('s_business_name').value,
        business_title: document.getElementById('s_business_title').value,
        business_description: document.getElementById('s_business_description').value,
        work_start: document.getElementById('s_work_start').value,
        work_end: document.getElementById('s_work_end').value,
        break_start: document.getElementById('s_break_start').value,
        break_end: document.getElementById('s_break_end').value,
        slot_interval: document.getElementById('s_slot_interval').value,
        work_days: document.getElementById('s_work_days').value,
      };
      fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
        .then(r => r.json()).then(() => { showToast('✅ Ayarlar kaydedildi'); loadStats(); });
    }

    function changePassword() {
      const current = document.getElementById('currentPassword').value;
      const newPw = document.getElementById('newPassword').value;
      if (!current || !newPw) { showToast('❌ Tüm alanları doldurun'); return; }
      fetch('/api/admin/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ current_password: current, new_password: newPw }) })
        .then(r => {
          if (!r.ok) { showToast('❌ Mevcut şifre hatalı'); return null; }
          return r.json();
        }).then(d => {
          if (d) { showToast('✅ Şifre değiştirildi'); document.getElementById('currentPassword').value = ''; document.getElementById('newPassword').value = ''; }
        });
    }

    // Barber appointments modal
    function showBarberAppointments(barberId, barberName) {
      const modal = document.getElementById('barberModal');
      const title = document.getElementById('barberModalTitle');
      const body = document.getElementById('barberModalBody');
      title.textContent = '👤 ' + barberName + ' - Randevular';
      body.innerHTML = '<div class="loading">Yükleniyor</div>';
      modal.classList.add('open');

      fetch('/api/appointments/by-barber/' + barberId)
        .then(r => r.json())
        .then(data => {
          body.innerHTML = '';
          if (data.appointments.length === 0) {
            body.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">Henüz randevu yok</p>';
            return;
          }
          const statusMap = { pending: 'Onay Bekliyor', confirmed: 'Onaylandı', completed: 'Tamamlandı', canceled: 'İptal Edildi' };
          data.appointments.forEach(a => {
            const item = document.createElement('div');
            item.className = 'appt-item';
            item.innerHTML = '<div class="top"><div><strong>' + a.service_name + '</strong> - ' + a.customer_name + '</div><div class="status status-' + a.status + '">' + (statusMap[a.status] || a.status) + '</div></div><div class="detail">📅 ' + a.date + ' ' + a.time + ' | 📞 ' + a.customer_phone + '</div>';
            body.appendChild(item);
          });
        })
        .catch(() => {
          body.innerHTML = '<p style="color: #dc3545; text-align: center;">Yüklenirken hata oluştu</p>';
        });
    }

    function closeBarberModal() {
      document.getElementById('barberModal').classList.remove('open');
    }

    // Click outside to close
    document.getElementById('barberModal').addEventListener('click', function(e) {
      if (e.target === e.currentTarget) closeBarberModal();
    });

    // === Customer Appointment Modal ===
    function showCustomerAppointments(phone, name) {
      const modal = document.getElementById('customerModal');
      const title = document.getElementById('customerModalTitle');
      const body = document.getElementById('customerModalBody');
      title.textContent = '👤 ' + name + ' - Randevu Geçmişi';
      body.innerHTML = '<div class="loading">Yükleniyor</div>';
      modal.classList.add('open');

      fetch('/api/appointments/by-phone/' + encodeURIComponent(phone))
        .then(r => r.json())
        .then(data => {
          body.innerHTML = '';
          if (data.appointments.length === 0) {
            body.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">Henüz randevu yok</p>';
            return;
          }
          const statusMap = { pending: 'Onay Bekliyor', confirmed: 'Onaylandı', completed: 'Tamamlandı', canceled: 'İptal Edildi' };
          data.appointments.forEach(a => {
            const item = document.createElement('div');
            item.className = 'appt-item';
            item.innerHTML = '<div class="top"><div><strong>' + a.service_name + '</strong> → ' + a.barber_name + '</div><div class="status status-' + a.status + '">' + (statusMap[a.status] || a.status) + '</div></div><div class="detail">📅 ' + a.date + ' ' + a.time + ' | 📞 ' + a.customer_phone + '</div>';
            body.appendChild(item);
          });
        })
        .catch(() => {
          body.innerHTML = '<p style="color: #dc3545; text-align: center;">Yüklenirken hata oluştu</p>';
        });
    }

    function closeCustomerModal() {
      document.getElementById('customerModal').classList.remove('open');
    }

    // Click outside to close
    document.getElementById('customerModal').addEventListener('click', function(e) {
      if (e.target === e.currentTarget) closeCustomerModal();
    });
  </script>

  <!-- Barber Appointment Modal -->
  <div class="barber-modal" id="barberModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="barberModalTitle">Randevular</h3>
        <button class="modal-close" onclick="closeBarberModal()">&times;</button>
      </div>
      <div id="barberModalBody"></div>
    </div>
  </div>

  <!-- Customer Appointment Modal -->
  <div class="barber-modal" id="customerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="customerModalTitle">Randevu Geçmişi</h3>
        <button class="modal-close" onclick="closeCustomerModal()">&times;</button>
      </div>
      <div id="customerModalBody"></div>
    </div>
  </div>

  <!-- Off Days Modal -->
  <div class="barber-modal" id="offDaysModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="offDaysModalTitle">İzin Günleri</h3>
        <button class="modal-close" onclick="closeOffDaysModal()">&times;</button>
      </div>
      <div id="offDaysModalBody"></div>
      <div style="margin-top: 16px; border-top: 1px solid #e0e0e0; padding-top: 16px;">
        <h4 style="font-size: 14px; margin: 0 0 10px 0;">Yeni İzin Ekle</h4>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <input type="date" id="offDateInput" style="padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
          <div style="display: flex; gap: 8px;">
            <input type="time" id="offStartInput" placeholder="Başlangıç" style="flex:1; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
            <input type="time" id="offEndInput" placeholder="Bitiş" style="flex:1; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
          </div>
          <input type="text" id="offReasonInput" placeholder="Sebep (opsiyonel)" style="padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
          <button class="action-btn success" onclick="addOffDay()" style="padding: 10px;">İzin Ekle</button>
        </div>
        <p style="font-size: 12px; color: #888; margin-top: 8px;">💡 Tüm gün izin: saatleri boş bırakın<br>💡 Saatlik izin: başlangıç ve bitiş girin</p>
      </div>
    </div>
  </div>

</body>
</html>
